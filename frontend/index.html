<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Voice Document Agent</title>
    <style>
        :root {
            --bg-color: #0A1128; /* Dark Navy Base */
            --surface-color: #14213D; /* Lighter Navy Surface */
            --accent-color: #FCA311; /* Amber Accent */
            --accent-hover: #FFB703;
            --text-main: #E5E5E5;
            --text-muted: #9CA3AF;
            --border-radius: 16px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Upload Section */
        .upload-section {
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .upload-section input[type="file"] {
            display: none;
        }

        .upload-btn {
            background-color: transparent;
            color: var(--accent-color);
            border: 2px dashed var(--accent-color);
            padding: 1rem 2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .upload-btn:hover {
            background-color: rgba(252, 163, 17, 0.1);
            transform: translateY(-2px);
        }

        .upload-status {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: var(--text-muted);
            min-height: 1.2em;
        }

        /* Status Display */
        .status-display {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            min-height: 2.5rem;
            transition: color 0.3s;
        }

        /* Mic Button */
        .mic-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 3rem 0;
            position: relative;
        }

        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--surface-color), #0f1930);
            border: 4px solid var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(252, 163, 17, 0.2);
            -webkit-user-select: none;
            user-select: none;
        }

        .mic-btn svg {
            width: 60px;
            height: 60px;
            fill: var(--accent-color);
            transition: fill 0.2s;
        }

        .mic-btn:active {
            transform: scale(0.9);
            background-color: var(--accent-color);
            box-shadow: 0 0 50px rgba(252, 163, 17, 0.6);
        }

        .mic-btn:active svg {
            fill: var(--bg-color);
        }

        /* Pulse Animation Overlay mapped via JS */
        .pulse-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: var(--accent-color);
            z-index: -1;
            opacity: 0;
            pointer-events: none;
        }

        .recording .pulse-ring {
            animation: pulse 1.5s infinite ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* Transcript & Latency */
        .transcript-area {
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .transcript-area h3 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .query-text {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-style: italic;
            color: var(--text-main);
        }

        .latency-breakdown {
            font-family: "Courier New", Courier, monospace;
            background-color: rgba(0,0,0,0.4);
            padding: 1.25rem;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .latency-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .latency-item:last-child {
            margin-bottom: 0;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px dashed rgba(255,255,255,0.1);
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Document Upload Header Widget -->
    <div class="upload-section">
        <label for="pdf-upload" class="upload-btn">Select PDF to Index</label>
        <input type="file" id="pdf-upload" accept="application/pdf">
        <div id="upload-status" class="upload-status">Awaiting document context...</div>
    </div>

    <!-- Live Status Label -->
    <div id="status-display" class="status-display">Idle</div>

    <!-- Active Recording Push-To-Talk Interactor -->
    <div class="mic-container" id="mic-container">
        <div class="pulse-ring"></div>
        <div id="mic-btn" class="mic-btn" draggable="false">
            <!-- Material Mic Icon -->
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </div>
    </div>

    <!-- Runtime Feedback Area -->
    <div class="transcript-area">
        <h3>Captured Transcript</h3>
        <div id="query-text" class="query-text">Ready. Hold the microphone to begin asking a question.</div>
        
        <div id="latency-breakdown" class="latency-breakdown">
            <div class="latency-item"><span>STT Recognition:</span> <span id="lat-stt">-- ms</span></div>
            <div class="latency-item"><span>Vector Retrieval:</span> <span id="lat-ret">-- ms</span></div>
            <div class="latency-item"><span>TTFS (First Audio):</span> <span id="lat-first">-- ms</span></div>
            <div class="latency-item"><span>Total Pipelined:</span> <span id="lat-tot">-- ms</span></div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
